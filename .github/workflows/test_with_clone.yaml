---
name: Test Changes with Cloned DB

on:
    pull_request:
        types: [ opened, synchronize, reopened, closed ]
        branches:
          - dev

permissions:
    contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:

    test_with_clone:
        runs-on: ubuntu-latest
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip_cloning') && github.event.pull_request.state == 'open' }}
        environment: dev
        env:
            # Establish the snowflake account credentials
            SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
            SNOWFLAKE_USER: ${{ vars.ADMIN_SERVICE_USER }}
            PRIVATE_KEY_PASSPHRASE: ${{ secrets.ADMIN_SERVICE_PASS_PHRASE }}

            # Source database to clone (SYNAPSE_DATA_WAREHOUSE_DEV in the dev environment)
            SNOWFLAKE_DOMAIN_ORIGINAL: ${{ vars.SNOWFLAKE_SYNAPSE_DATA_WAREHOUSE_DATABASE }}

            # Stage/integration variables consumed by synapse_data_warehouse/schemachange-config.yml
            # during the deploy phase of the procurement script.
            SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWSQL_WAREHOUSE }}
            SNOWFLAKE_SYNAPSE_STAGE_STORAGE_INTEGRATION: ${{ vars.SNOWFLAKE_SYNAPSE_STAGE_STORAGE_INTEGRATION }}
            SNOWFLAKE_SYNAPSE_STAGE_URL: ${{ vars.SNOWFLAKE_SYNAPSE_STAGE_URL }}
            SNOWFLAKE_SNAPSHOTS_STAGE_STORAGE_INTEGRATION: ${{ vars.SNOWFLAKE_SNAPSHOTS_STAGE_STORAGE_INTEGRATION }}
            SNOWFLAKE_SNAPSHOTS_STAGE_URL: ${{ vars.SNOWFLAKE_SNAPSHOTS_STAGE_URL }}
            STACK: ${{ vars.STACK }}

        steps:
            - uses: actions/checkout@v6

            - name: Configure Snowflake
              uses: ./.github/actions/configure-snowflake-cli
              with:
                  PRIVATE_KEY_PASSPHRASE: ${{ secrets.ADMIN_SERVICE_PASS_PHRASE }}
                  PRIVATE_KEY: ${{ secrets.ADMIN_SERVICE_PRIVATE_KEY }}
                  ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
                  USER: ${{ vars.ADMIN_SERVICE_USER }}

            # Procure an RBAC-configured zero-copy clone and deploy schemachange to it.
            # The script discovers the ownership hierarchy at runtime, so it auto-adapts
            # when schemas are added — no per-schema maintenance of this workflow is needed.
            # `uv run` syncs the workspace (installs the snowclone package + its connector).
            - name: Procure clone and deploy
              shell: bash
              run: |
                uv run snowclone freeze \
                  --database "$SNOWFLAKE_DOMAIN_ORIGINAL" \
                  --clone-suffix "${{ github.head_ref }}" \
                  --deploy-folder synapse_data_warehouse

    drop_clone:
      runs-on: ubuntu-latest
      if: github.event.action == 'closed'
      environment: dev
      env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWFLAKE_USER: ${{ vars.ADMIN_SERVICE_USER }}
          PRIVATE_KEY_PASSPHRASE: ${{ secrets.ADMIN_SERVICE_PASS_PHRASE }}
          SNOWFLAKE_DOMAIN_ORIGINAL: ${{ vars.SNOWFLAKE_SYNAPSE_DATA_WAREHOUSE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWSQL_WAREHOUSE }}

      steps:
          - uses: actions/checkout@v6

          - name: Configure Snowflake
            uses: ./.github/actions/configure-snowflake-cli
            with:
                PRIVATE_KEY_PASSPHRASE: ${{ secrets.ADMIN_SERVICE_PASS_PHRASE }}
                PRIVATE_KEY: ${{ secrets.ADMIN_SERVICE_PRIVATE_KEY }}
                ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
                USER: ${{ vars.ADMIN_SERVICE_USER }}

          - name: Drop the clone and its proxy admin role
            shell: bash
            run: |
              uv run snowclone melt \
                --database "$SNOWFLAKE_DOMAIN_ORIGINAL" \
                --clone-suffix "${{ github.head_ref }}"
