[project]
name = "snowclone"
version = "0.1.0"
description = "Procure RBAC-configured zero-copy Snowflake clone environments for development."
requires-python = "~=3.12.0"
dependencies = [
    "snowflake-connector-python>=3.18,<4",
]

# Single console entry point with subcommands: `uv run snowclone freeze …` /
# `uv run snowclone melt …`.
[project.scripts]
snowclone = "snowclone.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/snowclone"]

[dependency-groups]
# Hermetic unit tests — the conftest stub fakes snowflake.connector, so the suite
# needs only pytest (the connector is still installed as a runtime dependency).
test = [
    "pytest>=8,<9",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
